body:
  text: 注心要法門整理者方廣錩題解注心要法門唐代著名僧人宗密對澄觀所著心要法門的注疏一卷澄觀為華嚴宗四祖世稱清涼大師他的心要法門篇幅不長收在景德傳燈録卷三十中題作五臺山鎮國大師澄觀答皇太子問心要以下簡稱景德本澄觀之所以被稱為五臺山鎮國大師是因為唐德宗貞元年間他曾應詔從五臺山到長安被敕封為鎮國大師而所謂皇太子即唐德宗之太子李誦李誦守儲位二十年以賢稱年繼位為唐順宗旋退居太上皇次年年逝世根據景德本的標題澄觀此心要法門係德宗貞元年間李誦為皇太子時所撰據宋高僧傳之澄觀本傳澄觀於大曆十一年年至五臺山其後曾往禮峨嵋又回五臺潛心鑽研典籍撰寫並講解華嚴新疏聲名鵲起貞元七年年德宗降中使李輔光宣詔澄觀入都參與四十華嚴譯場澄觀苦辭請明年入敕允貞元八年年五月澄觀如約至長安同一本傳中並有澄觀撰寫該心要法門的記載稱順宗在春宮嘗垂教令述了義一卷心要一卷並食肉得罪因緣洎至長安頻加禮接該記載與景德本首題中的皇太子云云恰好相應由此可知澄觀撰寫該心要法門的時間應在他到長安之前考慮到澄觀於貞元三年年十二月剛剛完成新疏貞元四年年初開始應請講疏從此逐漸為人所知則認為他的這部心要法門是貞元七年接受德宗宣詔以後貞元八年五月到達長安之前所撰或無大差景德本心要法門被景德傳燈録卷三十所收從而納入歷代大藏經宗密的注心要法門則從來未為我國歷代大藏經所收日本續藏經收入了該注心要法門以下簡稱續藏本但歷代有關資料並無宗密撰寫此注疏的記載新近發現的敦煌遺書大乘禪門要録載録了宗密的全部著作其中也沒有見到這部注心要法門的蹤迹因此續藏本未免孤證之嫌年沙俄柯茲洛夫探險隊在我國西夏故城黑城今內蒙境內發掘到大量文物包括西夏文漢文等各種文字的許多遺書近年來這些遺書日益為人們所重視與研究其中亦有該宗密的注心要法門以下簡稱黑城本黑城本的出現為宗密注心要法門的真實性提供了證據該黑城本注心要法門現收藏於俄國聖彼得堡東方研究所我所利用的是日本著名學者入矢義高先生於年贈送的一個復印件在此對入矢先生表示衷心的感謝與追念上述三本景德本所録僅為澄觀心要法門的正文無宗密的注疏續藏本用大字書寫正文用雙行小字夾注注疏與景德本相比正文的文字有若干參差末尾還多出心要法門頌一首黑城本形態與續藏本基本相同大字正文雙行小字夾注正文與注釋的文字與續藏本也基本相同略有參差但黑城本通卷上部加有科文這是續藏本所沒有的此外黑城本的首題為兩層第一層作清涼答順宗圭峰蘭若沙門宗密注這是注心要法門的標題第二層作順宗皇帝所問心要法門華嚴疏主清涼國師澄觀答這是心要法門的原題宗密對兩層標題都作了注釋但對第一層標題中的圭峰蘭若沙門宗密注一句未作注釋這增加了本注釋為宗密所撰的可信程度也反映出黑城本較為接近注心要法門的原始形態而續藏本將首題及撰注者改作答順宗心要法門唐清涼國師澄觀撰圭峰沙門宗密注且刪除宗密對標題的注疏顯然經過後人的加工因此黑城本的發現為該注心要法門的校定提供了新的資料對研究澄觀與宗密思想乃至唐代華嚴宗及五臺山佛教都有一定的意義如前所述心要法門是澄觀應李誦垂詢而撰時李誦尚守位春宮未即帝位而續藏本首尾題均作答順宗心要法門黑城本首題稱清涼答順宗又稱順宗皇帝所問心要法門黑城本扉畫亦將聽法人畫成帝王模樣凡此種種説明兩本均將該心要法門的産生歸於順宗在位時這是不正確的黑城本注心要法門原收藏號為在原蘇聯著名漢學家孟列夫的黑城出土漢文遺書敘録年莫斯科中有著録並附首尾書影新編為號在此先將孟列夫的該著録抄録如下所用為王克孝同志的翻譯本原藏録號圭峰蘭若沙門宗密注順宗皇帝所問心要法門華嚴疏主清涼國師澄觀答大正藏中未收入的作品和注釋包括澄觀年答唐順宗年和宗密年的注釋木刻本經折裝全件紙色白澀滯厚毫米宋體字世紀前的宋版本包括兩部分一版畫折面一紙欄面釐米單欄畫中一小桌上放著香爐右邊坐一僧人站一侍者左邊坐著皇帝站一官員版畫刻印精細二著作和注釋的正文第紙均折面第紙折面頁碼在各紙右欄上第行是版面題詞清涼答順宗折面釐米欄面釐米單欄此刊本的版面被分成兩部分下面是正文和小字雙行注釋上面是注釋結構示意正文面行行字有首題和尾題尾題注心要法門正文結尾有加了標題心要法門頌的五言詩尾題下面是黑底陰文的施主題名善友施尾題上方蓋有書主人的長方形淡紫褐色印章釐米雙欄內為雙行楷體李醜兒宅經記封皮表面為黃紙裏面糊了一張有漢文文書草體的紙封皮上有印下的書簽注清涼心要黑底陰文雙欄孟列夫的著録甚為詳盡但亦有若干不妥今根據復印件對上述著録略作補正該遺書為刻本孟列夫定其為宋刻本入矢義高先生認為是遼刻本我比較傾向贊同入矢義高先生的觀點因為遼代崇華嚴刊刻華嚴類著作較多而現知宋代單刻華嚴類著作則不若遼代從復印件看刊刻字體與風格亦與遼刻本相同再説黑城出土刻本佛典大抵為遼刻遼代禁止書籍外流傳世遼刻本甚為稀見故本書之文物價值亦值得重視該遺書首為扉畫一紙折為三個半頁單框構圖為中央置一方形小幾圍有桌幔上有一香爐及另一容器用途不詳右邊置一法座一僧人趺坐其上正結印説法傍立一侍者亦為僧裝兩僧人均頂有圓光背有祥雲簇擁當為澄觀與侍者左邊一椅一人頭戴通天冠正襟危坐合掌聽法傍立一人宋代官員裝束背景為天雨花通天冠為唐宋皇帝所戴故右邊兩人應為李誦與侍從官員遼代制度皇帝與漢族官員均為漢裝皇后與契丹族官員著契丹裝應縣木塔所出遼刻佛典扉畫中的各色漢人所著亦均為漢裝所以本扉畫右邊兩人的漢裝不能作為本遺書是宋刻的依據孟列夫著録中所謂的注釋結構示意實即科文所謂科文是為了方便解釋經論而將內容分成若干段落再歸納出的各段落的大意由於本遺書中宗密的注釋乃是澄觀心要法門的附屬部分所以科文也是對整個心要法門而作並非僅是宗密注釋的結構示意現將該文獻整理録校如下黑城本之科文本在原卷的上端並用連線表示其不同的層次録校時為方便起見改為隨文段落並按照後代佛教科文的傳統加注天干以表示不同的層次所加天干用括弧括起以示與原文的區別録校時凡屬澄觀心要法門正文一概用小四號楷體字表示凡屬宗密注釋一概用五號宋體字表示凡屬科文一概用五號黑體字表示關於本文獻思想及科文的研究擬另文進行整理本之底校本如下底本黑城本現藏俄國聖彼得堡甲本景德本見景德傳燈録卷三十所用為日本京都東寺所藏崇寧藏本見日本京都花園大學年月影印本第頁乙本續藏本見新纂大日本續藏經第卷第頁續藏本無科文景德本無注釋與科文為避文繁不一一出注録文清涼答順宗將釋心要文三甲一初釋問答人二乙一初釋帝主順宗者歷帝記云大唐第十一代順宗皇帝是也乙二後清涼清涼者佳號也準碑文云師本越州人俗姓夏候氏十一便投師體真寶林寺年滿具尸羅解通三藏義等其問答義在向下也圭峰蘭若沙門宗密注甲二二釋疏主順宗皇帝所問心要法門甲三三釋問答義二乙一初順宗問二丙一初通釋心者所證之理也門者能生之文也法者軌生物解也因文生智以為軌則悟此心地誠為要哉丙二後引證裴公云觀者見法之眼門者通智眼令見法之門也華嚴疏主清涼國師澄觀答乙二後清涼答三丙一初正答四丁一初標旨至道本乎其心諸佛衆生迷悟本也丁二二釋心之相心法本乎無住萬法之宗本乎無住即心體也淨名經云依無住本立一切法丁三三體用無住心體靈知不昧瑩淨之理性相寂然性即空空絶迹相即星象粲然包含德用性包含於神用具塵沙之無邊該攝內外相該攝於內外亦不在於中間能廣無外也能深無內也非有非空妙有不空真空不有不生不滅非四相所遷也無始無終求之不得棄之不離明一真心地絶取捨之情丁四四出因五戊一初釋迷悟迷現量則惑苦紛然迷本逐末悟真性則空明廓徹返本還源戊二二縱奪除疑雖即心即佛唯證者方知凡聖一真猶來見隔見在即凡情忘即佛智與理冥境與神會者方知也戊三三釋迷相然有證有知則慧日沈沒於有地若存證知則棄內而外求即滯於有若無照無悟則昏雲掩蔽於空門若忘智忘照即外忘緣而內忘照即滯於無戊四四釋悟相但一念不生前後際斷妄心不生二際俱斷照體獨立物我皆如真智現前我及我所悉皆同體直造心源無智無得至理虛玄言忘慮絶不可以識識不可以行得不取不捨性自天真本無取捨無對無修本非對待豈有修作戊五五通妨難六己一初通妨然迷悟更依真妄相待迷即六凡悟則四聖真智生妄念滅妄若起真智隱己二二喻若求真去妄如避影以勞形若有取捨勞形役智若體妄即真似處蔭而影滅妄無自性舉體即真己三三反合前喻若無心忘照則萬纍都捐既忘心照煩惱自空若任運寂知則衆行爰起起即體之用用而無用何假因耶己四四顯無礙相放曠任其去住不著彼此靜鑒見其源流動靜不失理也語默不失玄微語默全真動靜豈離法界去住合道己五五就觀釋四庚一初止觀雙泯言止則雙忘知寂止觀俱泯庚二二止觀雙彰論觀則雙照寂知止觀齊彰庚三三正明中道語證不可示人寂然之理不可説示説理非證不了唯證相應悟寂無寂智與理泯真知無知真知之理泯能知智以知寂不二之一心以即理之智也契空有雙融之中道證不二之理也庚四四展轉拂迹入玄無住無著二邊不立中道不安莫攝莫收任法界性延促無礙是非兩忘能所雙絶斯絶亦絶般若現前法界真性思慮叵窮若絶能所則真智現前也己六徵釋所以四庚一初徵釋般若非心外新生不從外得智性乃本來具足非新新有然本寂不能自見實由般若之功理非智不能顯也庚二二理智相資般若之與智性翻覆相成智非理不能生庚三三雙泯本智之與始終兩體雙絶本末俱泯庚四四了達果相釋成問二辛一初明證果證入則妙覺圓明體無瑕翳辛二二因果交徹悟本則因果交徹凡聖相入心心作佛無一心而非佛心念念全真處處證真無一塵而非佛國即染而淨真妄物我舉一全收二而不二心佛衆生炳然齊致不二而二丙二次通結四丁一初結迷悟迷則人隨於法法法萬差而人不同迷真逐妄悟則法隨於人人人一致而融萬境物象無體丁二二結拂迹言窮慮絶何果何因本離言念丁三三雙結體用體本寂寥孰同孰異非同異境唯忘懷虛朗消息沖融佩道之士契之即神丁四四喻顯其猶透水月華虛而可見喻之也無心鏡像照而常空矣虛心之鑒丙三後偈頌三心要法門頌丁一初頌頌迷欲達心源淨所迷之理須知我相空萬物自虛形容何處實緣生本無念慮本無蹤起處不真丁二次頌頌悟豁爾靈明現似日初出翛然世界通即無障礙真金開伏藏情忘理現赫日出暝曚智起惑忘丁三後半真妄體用同時試將心比佛性無異故與佛始終同真妄無別注心要法門録文完
